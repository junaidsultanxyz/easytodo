# EasyTodo Configuration
# Place at ~/.config/easytodo/config.toml

data_dir = "~/.local/share/easytodo/tasks"
editor = ""

# ── Theme ────────────────────────────────────────────────────────────────────
# Colors support rgb(R,G,B) and #RRGGBB formats.
[theme]
selected_bg = "rgb(90, 90, 90)"
done_fg = "rgb(100, 150, 100)"
border = "rgb(204, 204, 204)"
command_bar_bg = "rgb(155, 155, 155)"
modal_bg = "rgb(74, 74, 74)"
title_fg = "rgb(180,180,220)"
normal_bg = "rgb(37, 37, 37)"
status_bar_fg = "rgb(143, 143, 143)"

# ── Keybindings ──────────────────────────────────────────────────────────────
# Single keys: j, k, Enter, Space, Esc, Up, Down
# Ctrl combos: Ctrl+N, Ctrl+P, etc.
[keybindings]
move_down = "j"
move_up = "k"
toggle_done = "Enter"
show_detail = "l"
filter_all = "1"
filter_todo = "2"
filter_done = "3"
new_task = "Ctrl+N"
edit_task = "Ctrl+E"
delete_task = "Ctrl+D"
open_config = "Ctrl+B"
command_bar = "Ctrl+P"
help = "Ctrl+H"
reload = "Ctrl+R"
quit = "Ctrl+Q"
